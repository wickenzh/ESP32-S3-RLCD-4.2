name: Build ESP-IDF Firmware Release

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.3
          target: esp32s3
          path: .

      - name: Create GitHub Release from R2 metadata
        env:
          R2_VERSIONS_URL: ${{ vars.R2_VERSIONS_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 <<'PY'
          import hashlib
          import json
          import os
          import re
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          versions_url = os.environ.get("R2_VERSIONS_URL", "").strip()
          if not versions_url:
              raise SystemExit("Repository variable R2_VERSIONS_URL is not configured")

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          api = f"https://api.github.com/repos/{repo}"

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "esp32-release-builder",
          }

          def http_json(method, url, payload=None, raw=None, extra_headers=None, not_found_none=False, timeout=180):
              req_headers = dict(headers)
              data = raw

              if payload is not None:
                  data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
                  req_headers["Content-Type"] = "application/json"

              if extra_headers:
                  req_headers.update(extra_headers)

              for attempt in range(1, 6):
                  req = urllib.request.Request(url, data=data, method=method, headers=req_headers)
                  try:
                      with urllib.request.urlopen(req, timeout=timeout) as response:
                          body = response.read()
                          return json.loads(body.decode("utf-8")) if body else {}
                  except urllib.error.HTTPError as exc:
                      detail = exc.read().decode("utf-8", errors="replace")
                      if exc.code == 404 and not_found_none:
                          return None
                      if attempt == 5 or exc.code not in (408, 429, 500, 502, 503, 504):
                          raise SystemExit(f"GitHub API {method} {url} failed: HTTP {exc.code} {detail}") from exc
                  time.sleep(attempt * 2)

          def fetch_json(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "esp32-release-builder/1.0",
                      "Accept": "application/json",
                      "Cache-Control": "no-cache",
                  },
              )
              with urllib.request.urlopen(req, timeout=60) as response:
                  return json.loads(response.read().decode("utf-8"))

          def normalize_tag(version):
              version = str(version).strip()
              if not version:
                  return ""
              return version if version.startswith("v") else f"v{version}"

          def version_key(version):
              nums = [int(x) for x in re.findall(r"\d+", version)]
              return nums or [0]

          data = fetch_json(versions_url)
          items = data.get("items", [])
          if not items:
              raise SystemExit("R2 versions.json has no items")

          latest = normalize_tag(data.get("latest") or sorted(items, key=lambda x: version_key(x.get("version", "")), reverse=True)[0].get("version"))

          current = None
          for item in items:
              if normalize_tag(item.get("version")) == latest:
                  current = item
                  break

          if current is None:
              raise SystemExit(f"Cannot find latest version metadata: {latest}")

          notes = current.get("notes") or "本版本暂无更新日志。"

          build_dir = Path("build")
          if not build_dir.exists():
              raise SystemExit("build directory not found")

          app_bins = list(build_dir.glob("*.bin"))
          boot_bins = list((build_dir / "bootloader").glob("*.bin"))
          part_bins = list((build_dir / "partition_table").glob("*.bin"))

          files = []
          files.extend(app_bins)
          files.extend(boot_bins)
          files.extend(part_bins)

          elf_files = list(build_dir.glob("*.elf"))
          map_files = list(build_dir.glob("*.map"))
          files.extend(elf_files)
          files.extend(map_files)

          if not files:
              raise SystemExit("No firmware files found in build directory")

          sha_lines = []
          for file in files:
              sha = hashlib.sha256(file.read_bytes()).hexdigest()
              sha_lines.append(f"{sha}  {file.name}")

          sha_file = Path("build") / "sha256.txt"
          sha_file.write_text("\n".join(sha_lines) + "\n", encoding="utf-8")
          files.append(sha_file)

          body = f"""# {latest}

          ## 更新日志

          {notes}

          ## 固件说明

          - App 固件：用于 OTA 升级
          - Bootloader：启动引导文件
          - Partition Table：分区表
          - ELF / MAP：用于调试和排查问题

          ## 构建信息

          - Commit: `{os.environ.get("GITHUB_SHA", "")}`
          - 构建方式：GitHub Actions 自动编译
          - 版本来源：Cloudflare R2 `versions.json`
          """

          release = http_json("GET", f"{api}/releases/tags/{latest}", not_found_none=True)

          release_payload = {
              "name": latest,
              "body": body,
              "draft": False,
              "prerelease": False,
              "make_latest": "true",
          }

          if release is None:
              create_payload = dict(release_payload)
              create_payload["tag_name"] = latest
              release = http_json("POST", f"{api}/releases", create_payload)
          else:
              release = http_json("PATCH", f"{api}/releases/{release['id']}", release_payload)

          assets = http_json("GET", f"{api}/releases/{release['id']}/assets") or []
          upload_url = release["upload_url"].split("{")[0]

          for asset in assets:
              http_json("DELETE", f"{api}/releases/assets/{asset['id']}")

          for file in files:
              asset_name = f"{latest}_{file.name}"
              encoded_name = urllib.parse.urlencode({"name": asset_name})
              http_json(
                  "POST",
                  f"{upload_url}?{encoded_name}",
                  raw=file.read_bytes(),
                  extra_headers={"Content-Type": "application/octet-stream"},
                  timeout=300,
              )
              print(f"uploaded {asset_name}")

          print(f"Release {latest} created/updated from local build artifacts")
          PY
